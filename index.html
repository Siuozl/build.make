<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Build.Make">
<meta name="theme-color" content="#0a0a0f">
<title>Build.Make</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

/* ============================= VARIABLES ============================= */
:root {
  --blue: #2979ff;
  --blue-dim: #1a4dcc;
  --blue-glow: rgba(41,121,255,0.15);
  --blue-border: rgba(41,121,255,0.3);
  --blue-border-bright: rgba(41,121,255,0.7);
  --radius: 12px;
  --radius-sm: 8px;
  --font-main: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --transition: 0.18s cubic-bezier(.4,0,.2,1);
  --spring: 0.28s cubic-bezier(.34,1.56,.64,1);
}
body.dark {
  --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --bg4: #22222e;
  --border: rgba(41,121,255,0.2);
  --text: #e8eaf6; --text2: #8892b0; --text3: #4a5580;
  --card-bg: #13131e; --header-bg: rgba(10,10,15,0.94);
  --input-bg: #0d0d18; --picker-bg: #0f0f1a; --run-bg: #080812;
  --children-bg: rgba(41,121,255,0.04);
  --children-border: rgba(41,121,255,0.18);
}
body.light {
  --bg: #f0f2ff; --bg2: #e8eaf8; --bg3: #dde0f7; --bg4: #d0d4f0;
  --border: rgba(41,121,255,0.25);
  --text: #0a0c1e; --text2: #3a4470; --text3: #8892b0;
  --card-bg: #ffffff; --header-bg: rgba(240,242,255,0.94);
  --input-bg: #ffffff; --picker-bg: #f5f7ff; --run-bg: #eef0ff;
  --children-bg: rgba(41,121,255,0.03);
  --children-border: rgba(41,121,255,0.15);
}

/* ============================= RESET ============================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font-main); font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}
#app {
  width: 100%; height: 100%; height: 100dvh;
  display: flex; flex-direction: column; overflow: hidden; position: relative;
}

/* ============================= ANIMATIONS ============================= */
@keyframes fadein    { from{opacity:0;transform:translateY(6px)}  to{opacity:1;transform:translateY(0)} }
@keyframes slideup   { from{opacity:0;transform:translateY(44px)} to{opacity:1;transform:translateY(0)} }
@keyframes slidein   { from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)} }
@keyframes blockslide{ from{opacity:0;transform:translateX(-8px) scale(0.97)} to{opacity:1;transform:translateX(0) scale(1)} }
@keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 var(--blue-glow)} 50%{box-shadow:0 0 16px 4px var(--blue-glow)} }
@keyframes dotPulse  { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.35);opacity:.7} }
@keyframes childrenOpen { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

.animate-fadein    { animation: fadein var(--transition) both; }
.animate-slideup   { animation: slideup var(--spring) both; }
.animate-slidein   { animation: slidein var(--transition) both; }
.animate-blockslide{ animation: blockslide 0.22s cubic-bezier(.34,1.56,.64,1) both; }

/* ============================= HEADER ============================= */
.header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  background: var(--header-bg);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; position: relative; z-index: 10;
}
.header-logo { display:flex; align-items:center; gap:8px; flex:1; }
.logo-text { font-weight:800; font-size:20px; letter-spacing:-0.5px; color:var(--text); }
.logo-dot-char { color:var(--blue); animation:dotPulse 2s ease-in-out infinite; display:inline-block; }
.logo-dot {
  width:10px; height:10px; border-radius:50%;
  background:var(--blue); box-shadow:0 0 8px var(--blue);
  animation:dotPulse 2s ease-in-out infinite; flex-shrink:0;
}
.header-title { font-weight:700; font-size:17px; flex:1; text-align:center; }
.header-actions { display:flex; align-items:center; gap:6px; }
.icon-btn {
  width:38px; height:38px; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--bg3);
  color:var(--text); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all var(--transition); flex-shrink:0;
}
.icon-btn:active { transform:scale(0.9); background:var(--bg4); }
.run-btn {
  background:var(--blue)!important; border-color:var(--blue)!important;
  color:white!important; font-size:14px;
  animation:pulseGlow 3s ease-in-out infinite;
}
.run-btn:active { transform:scale(0.86)!important; }
.proj-name-input {
  flex:1; background:transparent; border:none;
  border-bottom:1px solid var(--border); color:var(--text);
  font-family:var(--font-main); font-weight:700; font-size:15px;
  padding:4px 2px; outline:none; min-width:0;
  transition:border-color var(--transition);
}
.proj-name-input:focus { border-color:var(--blue); }
.lang-badge-sm {
  font-family:var(--font-mono); font-size:10px; font-weight:600;
  color:var(--blue); border:1px solid var(--blue-border);
  border-radius:4px; padding:2px 6px; background:var(--blue-glow); flex-shrink:0;
}

/* ============================= LIBRARY ============================= */
.library-body { flex:1; overflow-y:auto; padding:16px; -webkit-overflow-scrolling:touch; }
.library-title-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.library-title { font-size:22px; font-weight:800; letter-spacing:-.5px; }
.btn-primary {
  background:var(--blue); color:white; border:none;
  border-radius:var(--radius-sm); padding:10px 18px;
  font-family:var(--font-main); font-weight:700; font-size:14px;
  cursor:pointer; transition:all var(--spring);
  box-shadow:0 4px 14px rgba(41,121,255,.3);
}
.btn-primary:active { transform:scale(0.94); box-shadow:none; }
.btn-full { width:100%; padding:14px; font-size:16px; border-radius:var(--radius); }
.project-list { display:flex; flex-direction:column; gap:12px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text2); }
.empty-icon { font-size:48px; margin-bottom:14px; }
.empty-state p { line-height:1.6; }
.project-card {
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px;
  transition:border-color var(--transition), transform var(--transition);
  position:relative; overflow:hidden;
}
.project-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--blue-border),transparent); opacity:.6;
}
.project-card:active { transform:scale(0.985); border-color:var(--blue-border-bright); }
.project-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:6px; }
.project-name { font-weight:700; font-size:16px; word-break:break-word; }
.lang-badge { font-family:var(--font-mono); font-size:10px; font-weight:600; border:1px solid; border-radius:4px; padding:2px 6px; flex-shrink:0; white-space:nowrap; }
.project-meta { font-size:12px; color:var(--text3); margin-bottom:10px; font-family:var(--font-mono); }
.project-actions { display:flex; gap:8px; }
.btn-card {
  flex:1; padding:8px 10px; border-radius:var(--radius-sm);
  border:1px solid var(--border); font-family:var(--font-main);
  font-weight:600; font-size:13px; cursor:pointer;
  transition:all var(--transition); background:var(--bg3); color:var(--text);
}
.btn-card:active { transform:scale(0.93); }
.btn-open { background:var(--blue); color:white; border-color:var(--blue); }
.btn-ghost { background:transparent; color:var(--text2); }
.btn-danger { background:transparent; color:#ff5252; border-color:rgba(255,82,82,.3); }

/* ============================= NEW PROJECT FORM ============================= */
.form-page { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:20px; -webkit-overflow-scrolling:touch; }
.form-group { display:flex; flex-direction:column; gap:8px; }
.form-group label { font-weight:700; font-size:12px; color:var(--text2); letter-spacing:.6px; text-transform:uppercase; }
.input-field {
  background:var(--input-bg); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text);
  font-family:var(--font-main); font-size:16px;
  padding:12px 14px; outline:none; -webkit-appearance:none;
  transition:border-color var(--transition), box-shadow var(--transition);
}
.input-field:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-glow); }
.lang-picker { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.lang-option {
  border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:14px 12px; cursor:pointer; display:flex;
  align-items:center; gap:8px; font-weight:600; font-size:14px;
  color:var(--text2); background:var(--bg3); transition:all var(--spring);
}
.lang-option:active { transform:scale(0.93); }
.lang-option.selected { border-color:var(--blue); background:var(--blue-glow); color:var(--blue); box-shadow:0 0 0 1px var(--blue-border); }
.lang-option-icon { font-size:20px; }

/* ============================= MODE TOGGLE ============================= */
.mode-toggle-bar {
  display:flex; padding:8px 12px; gap:6px;
  border-bottom:1px solid var(--border); background:var(--bg2); flex-shrink:0;
}
.mode-btn {
  flex:1; padding:8px; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:transparent;
  color:var(--text2); font-family:var(--font-main);
  font-weight:600; font-size:13px; cursor:pointer; transition:all var(--transition);
}
.mode-btn:active { transform:scale(0.95); }
.mode-active { background:var(--blue); border-color:var(--blue); color:white; box-shadow:0 2px 10px rgba(41,121,255,.3); }

/* ============================= EDITOR BODY ============================= */
.editor-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:90px; }
.canvas-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; min-height:300px; color:var(--text2); padding:40px; text-align:center; }
.canvas-empty-icon { font-size:52px; margin-bottom:16px; }
.block-canvas { padding:12px; display:flex; flex-direction:column; gap:8px; }

/* ============================= BLOCK ITEMS ============================= */
.block-item {
  border:1px solid var(--blue-border);
  border-left:3px solid var(--block-color, var(--blue));
  border-radius:var(--radius-sm);
  background:var(--card-bg); overflow:hidden;
  transition:border-color var(--transition), transform var(--transition), box-shadow var(--transition);
}
.block-item:active { transform:scale(0.988); }
.block-selected {
  border-color:var(--blue-border-bright);
  box-shadow:0 0 0 1px var(--blue-border), 0 4px 18px var(--blue-glow);
}
.block-container {
  border-left-width: 3px;
}

.block-header {
  display:flex; align-items:center; gap:8px;
  padding:10px 12px; cursor:pointer; user-select:none;
}
.block-icon { font-size:15px; flex-shrink:0; min-width:20px; text-align:center; }
.block-label { font-weight:700; font-size:13px; flex:1; color:var(--text); }
.block-cat-badge { font-size:10px; color:var(--text3); font-family:var(--font-mono); white-space:nowrap; }
.block-drag-actions { display:flex; gap:3px; flex-shrink:0; }
.block-action-btn {
  width:24px; height:24px; border-radius:5px;
  border:1px solid var(--border); background:var(--bg3);
  color:var(--text2); font-size:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all var(--transition);
}
.block-action-btn:active { transform:scale(0.84); }
.block-del { color:#ff5252; border-color:rgba(255,82,82,.3); }

/* Fields */
.block-fields { display:none; flex-direction:column; gap:6px; padding:0 12px 10px; border-top:1px solid var(--border); padding-top:8px; }
.block-fields-open { display:flex; }
.field-row { display:flex; align-items:center; gap:8px; }
.field-label { font-size:11px; color:var(--text3); font-family:var(--font-mono); min-width:50px; flex-shrink:0; }
.block-field, .block-field-select {
  flex:1; background:var(--input-bg); border:1px solid var(--border);
  border-radius:6px; color:var(--text); font-family:var(--font-mono);
  font-size:12px; padding:7px 9px; outline:none; min-width:0;
  transition:border-color var(--transition); -webkit-appearance:none;
}
.block-field:focus, .block-field-select:focus { border-color:var(--blue); }

/* Container toggle */
.container-toggle {
  margin:0 12px 8px;
  padding:5px 10px;
  border-radius:6px;
  border:1px solid var(--blue-border);
  background:var(--blue-glow);
  color:var(--blue);
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition:all var(--transition);
  width:calc(100% - 24px);
  text-align:left;
}
.container-toggle:active { transform:scale(0.97); background:rgba(41,121,255,.2); }

/* Children area */
.block-children { display:none; }
.block-children-open { display:block; animation:childrenOpen 0.18s ease both; }
.block-children-inner {
  margin:0 8px 10px;
  padding:10px 0 4px 8px;
  border-left:2px solid var(--children-border);
  background:var(--children-bg);
  border-radius:0 0 8px 8px;
  display:flex; flex-direction:column; gap:7px;
}
.children-empty {
  color:var(--text3); font-size:12px; font-family:var(--font-mono);
  padding:12px; text-align:center; border:1px dashed var(--border);
  border-radius:6px; margin-bottom:6px;
}
.add-child-btn {
  margin-top:4px; padding:7px 12px;
  border:1px dashed var(--blue-border); border-radius:7px;
  background:transparent; color:var(--blue);
  font-family:var(--font-main); font-weight:600; font-size:12px;
  cursor:pointer; transition:all var(--transition);
  text-align:center;
}
.add-child-btn:active { background:var(--blue-glow); transform:scale(0.97); }

/* ============================= CODE EDITOR ============================= */
.code-editor-wrap { height:100%; min-height:calc(100dvh - 200px); padding:8px; }
.code-editor {
  width:100%; height:100%; min-height:calc(100dvh - 220px);
  background:var(--input-bg); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text);
  font-family:var(--font-mono); font-size:12.5px; line-height:1.7;
  padding:14px; outline:none; resize:none; -webkit-appearance:none;
  transition:border-color var(--transition);
}
.code-editor:focus { border-color:var(--blue); }

/* ============================= FAB ============================= */
.editor-fab-row {
  position:fixed;
  bottom:calc(24px + env(safe-area-inset-bottom));
  right:20px; z-index:40;
}
.fab {
  width:56px; height:56px; border-radius:50%;
  background:var(--blue); color:white; border:none;
  font-size:28px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 22px rgba(41,121,255,.45);
  transition:all var(--spring);
  animation:pulseGlow 3s ease-in-out infinite;
}
.fab:active { transform:scale(0.86); box-shadow:0 2px 8px rgba(41,121,255,.3); }

/* ============================= BLOCK PICKER ============================= */
.picker-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.58);
  backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); z-index:50;
}
.picker-sheet {
  position:fixed; bottom:0; left:0; right:0; height:80dvh;
  background:var(--picker-bg);
  border-top:1px solid var(--blue-border); border-radius:20px 20px 0 0;
  z-index:51; display:flex; flex-direction:column;
  box-shadow:0 -8px 40px rgba(41,121,255,.14);
}
.picker-handle {
  width:40px; height:4px; background:var(--text3);
  border-radius:2px; margin:12px auto 0; flex-shrink:0;
}
.picker-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  padding:10px 16px 8px; flex-shrink:0;
}
.picker-title { font-weight:800; font-size:17px; }
.picker-context { font-size:11px; color:var(--text3); font-family:var(--font-mono); margin-top:2px; }
.picker-search-wrap { padding:0 12px 8px; flex-shrink:0; }
.picker-search {
  width:100%; background:var(--input-bg); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text);
  font-family:var(--font-main); font-size:15px;
  padding:10px 14px; outline:none; -webkit-appearance:none;
  transition:border-color var(--transition);
}
.picker-search:focus { border-color:var(--blue); box-shadow:0 0 0 2px var(--blue-glow); }
.picker-cats {
  display:flex; gap:6px; padding:0 12px 10px;
  overflow-x:auto; flex-shrink:0; -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.picker-cats::-webkit-scrollbar { display:none; }
.picker-cat-btn {
  flex-shrink:0; padding:6px 14px; border-radius:20px;
  border:1px solid var(--border); background:transparent;
  color:var(--text2); font-family:var(--font-main); font-weight:600;
  font-size:12px; cursor:pointer; transition:all var(--transition); white-space:nowrap;
}
.picker-cat-btn:active { transform:scale(0.91); }
.cat-active { background:var(--blue); border-color:var(--blue); color:white; box-shadow:0 2px 10px rgba(41,121,255,.3); }
.picker-list { flex:1; overflow-y:auto; padding:4px 12px 40px; -webkit-overflow-scrolling:touch; }
.picker-block-item {
  display:flex; align-items:center; gap:12px;
  padding:10px; border-radius:var(--radius-sm);
  margin-bottom:6px; border:1px solid var(--border);
  background:var(--card-bg); transition:all var(--transition);
}
.picker-block-item:active { transform:scale(0.97); border-color:var(--blue-border-bright); }
.picker-block-icon {
  width:38px; height:38px; border-radius:8px; border:1px solid;
  display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0; font-family:var(--font-mono); font-weight:700;
}
.picker-block-info { flex:1; min-width:0; }
.picker-block-name { font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.picker-block-desc { font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.container-tag {
  display:inline-block; font-size:9px; font-family:var(--font-mono);
  background:rgba(41,121,255,.15); color:var(--blue);
  border:1px solid var(--blue-border); border-radius:3px;
  padding:1px 5px; vertical-align:middle; margin-left:4px;
}
.picker-add-btn {
  width:32px; height:32px; border-radius:50%;
  border:1px solid var(--blue-border); background:var(--blue-glow);
  color:var(--blue); font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all var(--spring); flex-shrink:0; line-height:1;
}
.picker-add-btn:active { transform:scale(0.8); background:var(--blue); color:white; }
.picker-empty { text-align:center; padding:40px 20px; color:var(--text3); font-size:14px; }

/* ============================= RUN OUTPUT ============================= */
.run-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.72);
  backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
  z-index:60; display:flex; flex-direction:column;
}
.run-panel {
  position:absolute; bottom:0; left:0; right:0; height:76dvh;
  background:var(--run-bg); border-top:1px solid var(--blue-border);
  border-radius:20px 20px 0 0; display:flex; flex-direction:column;
  box-shadow:0 -8px 40px rgba(41,121,255,.2);
}
.run-panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; border-bottom:1px solid var(--border);
  font-weight:700; font-size:15px; flex-shrink:0;
}
.run-iframe { flex:1; width:100%; border:none; background:white; border-radius:0 0 0 0; }
.run-console {
  flex:1; padding:16px; font-family:var(--font-mono); font-size:12.5px;
  line-height:1.7; color:#4cff91; background:#080e0a;
  overflow-y:auto; white-space:pre-wrap; word-break:break-word;
  border-radius:0 0 20px 20px;
}

/* ============================= PREFERENCES ============================= */
.prefs-page { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:24px; -webkit-overflow-scrolling:touch; }
.pref-section {}
.pref-label { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.theme-toggle-row { display:flex; gap:10px; }
.theme-btn {
  flex:1; padding:12px; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--bg3);
  color:var(--text2); font-family:var(--font-main);
  font-weight:600; font-size:15px; cursor:pointer; transition:all var(--spring);
}
